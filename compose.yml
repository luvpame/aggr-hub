services:
  server:
    restart: always
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    environment:
      SQLITE_DB_PATH: /data/aggr-hub.sqlite
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
    volumes:
      - sqlite-data:/data

  web:
    restart: always
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "80:8080"
    depends_on:
      - server

volumes:
  sqlite-data:
